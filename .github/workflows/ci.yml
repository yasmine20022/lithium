name: CI/CD to Minikube
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Minikube
        uses: medyagh/setup-minikube@latest
      - name: Load Docker image into Minikube
        run: |
          eval $(minikube docker-env)
          minikube image load lithium-app:latest
      - name: Apply Kubernetes manifest
        run: |
          [ -d k8s ] && kubectl apply -f /tmp/devops-autopilot-k8s/deployment.yaml || echo "k8s/ not found, skipping"
      - name: Wait for deployment rollout status
        run: |
          kubectl rollout status deployment/lithium-app --timeout=60s || true