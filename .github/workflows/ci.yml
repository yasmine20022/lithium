name: CI/CD to Minikube
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Build Docker image
        run: docker build -t lithium-app:latest .
  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Start Minikube
        uses: medyagh/setup-minikube@latest
      - name: Build image inside Minikube
        run: |
          eval $(minikube docker-env)
          docker build -t lithium-app:latest .
      - name: Apply Kubernetes manifests if present
        run: |
          [ -d k8s ] && kubectl apply -f /tmp/devops-autopilot-k8s/deployment.yaml || echo "k8s/ not found, skipping"
      - name: Rollout status
        run: kubectl rollout status deployment/lithium --timeout=60s || true
      - name: Create Kubernetes manifest
        run: |
          mkdir -p /tmp/devops-autopilot-k8s
          cat > /tmp/devops-autopilot-k8s/deployment.yaml <<'EOF'
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: lithium
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: lithium
            template:
              metadata:
                labels:
                  app: lithium
              spec:
                containers:
                  - name: lithium
                    image: lithium:latest
                    imagePullPolicy: Never
          EOF
